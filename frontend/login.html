<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - AutoElite</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<nav>
      <div class="logo">AUTO <span>BL3A2L</span></div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="cars.html">Cars</a></li>
    <li><a href="search.html">Search</a></li>
    <li><a href="compare.html">Compare</a></li>
    <li><a href="dealerships.html">Dealers</a></li>
    <li><a href="testdrive.html">Test Drive</a></li>
    <li><a href="calculator.html">Calculator</a></li>
    <li><a href="user-dashboard.html">Dashboard</a></li>
    <li><a href="login.html">Login</a></li>
  </ul>
</nav>

<section>
  <div class="section-title">
    <h2>Sign <span>In</span></h2>
    <div class="gold-line"></div>
  </div>

  <div class="auth-container">

    <div class="auth-box">
      <h3>Login</h3>

      <div id="loginMessage" style="margin-bottom: 15px; text-align: center;"></div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="Email">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Password">
      </div>

      <button class="btn-primary w-full" id="loginBtn">Login</button>

      <!-- LINK TO REGISTER -->
      <p style="margin-top:15px; text-align:center; color:#aaa;">
        Don’t have an account?
        <a href="register.html" style="color:#c0a060;">Create Account</a>
      </p>

    </div>

  </div>
</section>

<script src="auth.js"></script>
<script>
  document.getElementById("loginBtn").addEventListener("click", function() {
    const email = document.getElementById("loginEmail").value;
    const password = document.getElementById("loginPassword").value;
    const messageDiv = document.getElementById("loginMessage");

    if (!email || !password) {
      messageDiv.innerHTML = '<p style="color: #ff6b6b;">Please fill in all fields</p>';
      return;
    }

    const result = loginUser(email, password);

    if (result.success) {
      messageDiv.innerHTML = '<p style="color: #4caf50;">Login successful! Redirecting...</p>';
      setTimeout(() => {
        if (result.user.type === "admin") {
          window.location.href = "admin.html";
        } else {
          window.location.href = "index.html";
        }
      }, 1000);
    } else {
      messageDiv.innerHTML = '<p style="color: #ff6b6b;">' + result.message + '</p>';
    }
  });

  updateNavbar();
  initializeUsers();
</script>

</body>
</html>
