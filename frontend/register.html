<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - AutoElite</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<nav>
  <div class="logo">AUTO <span>BL3A2L</span></div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="cars.html">Cars</a></li>
    <li><a href="search.html">Search</a></li>
    <li><a href="compare.html">Compare</a></li>
    <li><a href="dealerships.html">Dealers</a></li>
    <li><a href="testdrive.html">Test Drive</a></li>
    <li><a href="calculator.html">Calculator</a></li>
    <li><a href="user-dashboard.html">Dashboard</a></li>
    <li><a href="login.html">Login</a></li>
  </ul>
</nav>

<section>
  <div class="section-title">
    <h2>Create <span>Account</span></h2>
    <div class="gold-line"></div>
  </div>

  <div class="auth-container">

    <div class="auth-box">
      <h3>Register</h3>

      <div id="registerMessage" style="margin-bottom: 15px; text-align: center;"></div>

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="registerName" placeholder="Full Name">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="registerEmail" placeholder="Email">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="registerPassword" placeholder="Password">
      </div>

      <button class="btn-primary w-full" id="registerBtn">Register</button>

      <!-- LINK BACK TO LOGIN -->
      <p style="margin-top:15px; text-align:center; color:#aaa;">
        Already have an account?
        <a href="login.html" style="color:#c0a060;">Sign In</a>
      </p>

    </div>

  </div>
</section>

<script src="auth.js"></script>
<script>
  document.getElementById("registerBtn").addEventListener("click", function() {
    const name = document.getElementById("registerName").value;
    const email = document.getElementById("registerEmail").value;
    const password = document.getElementById("registerPassword").value;
    const messageDiv = document.getElementById("registerMessage");

    if (!name || !email || !password) {
      messageDiv.innerHTML = '<p style="color: #ff6b6b;">Please fill in all fields</p>';
      return;
    }

    const result = addUser(name, email, password);

    if (result.success) {
      messageDiv.innerHTML = '<p style="color: #4caf50;">' + result.message + '</p>';
      setTimeout(() => {
        window.location.href = "login.html";
      }, 1500);
    } else {
      messageDiv.innerHTML = '<p style="color: #ff6b6b;">' + result.message + '</p>';
    }
  });

  updateNavbar();
  initializeUsers();
</script>

</body>
</html>
